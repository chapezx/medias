<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="script.js"></script>
    <a href="style.css"></a>
    <link rel="stylesheet" href="style.css">
    <title>Calculadora Estatistica</title>
</head>
<body>
    <h2>• Cálculo da média aritmética </h2>
    <p id="aritmetica"></p>
    <input type="number" id="n1" placeholder="Digite uma nota">
    <input type="number" id="n2" placeholder="Digite uma nota">
    <input type="number" id="n3" placeholder="Digite uma nota">
    <button type="button" onclick="aritmetica()">Calcular Média aritmetica</button>
<hr>
    <h2>• Cálculo da mediana </h2>
    <p id="mediana"></p>
    <input type="number" id="nn1" placeholder="Digite um valor">
    <input type="number" id="nn2" placeholder="Digite um valor">
    <input type="number" id="nn3" placeholder="Digite um valor">
    <input type="number" id="nn4" placeholder="Digite um valor">
    <input type="number" id="nn5" placeholder="Digite um valor">

    <button type="button" onclick="mediana()">Calcular Mediana</button>


 <hr>
    <h2>• Cálculo da variância amostral </h2>
    <p id="variancia"></p>
    <input type="number" id="nm1" placeholder="Digite o 1°Valor">
    <input type="number" id="nm2" placeholder="Digite o 2°Valor">
    <input type="number" id="nm3" placeholder="Digite o 3°Valor">
    <input type="number" id="nm4" placeholder="Digite o 4°Valor">
    <input type="number" id="nm5" placeholder="Digite o 5°Valor">

    <button type="button" onclick="variancia()">Calcular variância amostral</button>


<hr>
    <h2>• Cálculo do desvio padrão  </h2>
    <p id="desvio"></p>
    <input type="number" id="nmr1" placeholder="Digite o valor">
    <input type="number" id="nmr2" placeholder="Digite o valor">
    <input type="number" id="nmr3" placeholder="Digite o valor">
    <input type="number" id="nmr4" placeholder="Digite o valor">
    <input type="number" id="nmr5" placeholder="Digite o valor">

    <button type="button" onclick="desvio()">Calcular desvio padrão</button>



<hr>
    <h2>• Cálculo do coeficiente de variação (em porcentagem)  </h2>
    <p id="coeficiente"></p>
    <input type="number" id="nmrs1" placeholder="Digite o valor 1">
    <input type="number" id="nmrs2" placeholder="Digite o valor 2">
    <input type="number" id="nmrs3" placeholder="Digite o valor 3">
    <input type="number" id="nmrs4" placeholder="Digite o valor 4">
    <input type="number" id="nmrs5" placeholder="Digite o valor 5">

    <button type="button" onclick="coeficiente()">Calcular coeficiente de variação</button>


<hr>
    <h2>• conjunto de dados é homogêneo ou heterogêneo (utilizando como padrão 30%) </h2>
    <p id="dados"></p>
    <input type="number" id="d1" placeholder="Digite o valor 1">
    <input type="number" id="d2" placeholder="Digite o valor 2">
    <input type="number" id="d3" placeholder="Digite o valor 3">
    <input type="number" id="d4" placeholder="Digite o valor 4">
    <input type="number" id="d5" placeholder="Digite o valor 5">

    <button type="button" onclick="dados()">homogêneo ou heterogêneo</button>

</body>
</html>
